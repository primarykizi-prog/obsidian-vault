name: Google Docs → Obsidian 自動同期

on:
  schedule:
    - cron: '0 * * * *'   # 毎時0分に自動実行（日本時間 +9h）
  workflow_dispatch:        # GitHubのActionsページから手動実行も可能

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      # 1. リポジトリをチェックアウト
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2. Python 3.11 をセットアップ
      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. 必要なライブラリをインストール
      - name: 依存関係インストール
        run: |
          pip install \
            google-auth \
            google-auth-oauthlib \
            google-auth-httplib2 \
            google-api-python-client \
            anthropic

      # 4. 同期スクリプトを実行
      - name: Google Docs → Obsidian 同期実行
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python .github/scripts/sync_gdocs_to_obsidian.py

      # 5. 変更があればコミット・プッシュ
      - name: 変更をコミット・プッシュ
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Actions Bot"
          git add -A
          if git diff --staged --quiet; then
            echo "変更なし。プッシュをスキップします。"
          else
            git commit -m "🤖 自動同期: Google Docs → Obsidian $(date +'%Y-%m-%d %H:%M JST' -d '+9 hours')"
            git push
            echo "プッシュ完了"
          fi
